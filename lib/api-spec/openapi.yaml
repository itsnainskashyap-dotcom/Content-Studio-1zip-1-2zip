    CharacterImageRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
          minLength: 1
          maxLength: 1500
      required:
        - name
        - description
    CharacterImagesRequest:
      type: object
      properties:
        characters:
          type: array
          minItems: 1
          maxItems: 12
          items:
            $ref: "#/components/schemas/CharacterImageRequest"
        style:
          type: string
          maxLength: 200
          description: Visual style of the project (e.g. "Live Action Cinematic", "Cartoon Animation"). Used to keep the character look consistent with the rest of the production.
        aspectRatio:
          $ref: "#/components/schemas/AspectRatio"
          description: Aspect ratio for the reference sheet image. Defaults to 16:9 — the 3-panel composite is laid out side-by-side and reads cleanest in landscape regardless of the final video ratio.
      required:
        - characters
        - style
    CharacterImageResult:
      type: object
      properties:
        name:
          type: string
        objectPath:
          type: string
          description: Path to the generated image in object storage (e.g. "/objects/uploads/<uuid>"). Fetch via GET /api/storage/objects/<id>.
        mimeType:
          type: string
          description: e.g. "image/png" or "image/jpeg"
        generatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp the image was generated and saved.
      required:
        - name
        - objectPath
        - mimeType
        - generatedAt
    CharacterImageError:
      type: object
      properties:
        name:
          type: string
        message:
          type: string
      required:
        - name
        - message
    CharacterImagesResponse:
      type: object
      properties:
        images:
          type: array
          items:
            $ref: "#/components/schemas/CharacterImageResult"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/CharacterImageError"
      required:
        - images
        - errors
    GenerateFrameImageReference:
      type: object
      description: Optional character reference sheet image. Server fetches the bytes from object storage and forwards them inline to Gemini so the resulting frame still keeps faces / wardrobe consistent with the cast.
      properties:
        objectPath:
          type: string
          description: Object storage path of the reference image (e.g. "/objects/uploads/<uuid>").
          minLength: 1
        mimeType:
          type: string
          description: e.g. "image/png", "image/jpeg"
          minLength: 1
          maxLength: 64
      required:
        - objectPath
        - mimeType
    GenerateFrameImageRequest:
      type: object
      description: Generate a single film-still frame for a video part. The writer's `framePrompt` is wrapped server-side in an instruction template that locks the visual style and forbids reference-sheet output.
      properties:
        framePrompt:
          type: string
          minLength: 1
          maxLength: 4000
          description: The starting- or ending-frame prompt produced by the writer for a given video part.
        style:
          type: string
          maxLength: 200
          description: Visual style of the project (e.g. "Live Action Cinematic"). Used to keep the frame consistent with the rest of the production.
        characterReferences:
          type: array
          maxItems: 8
          description: Optional cast reference sheets to inject so faces stay on-model.
          items:
            $ref: "#/components/schemas/GenerateFrameImageReference"
        aspectRatio:
          $ref: "#/components/schemas/AspectRatio"
          description: Aspect ratio of the generated frame still. Should match the project's video aspect ratio so what the user sees here matches the final render. Defaults to 16:9.
      required:
        - framePrompt
        - style
    GenerateFrameImageResult:
      type: object
      properties:
        objectPath:
          type: string
          description: Path to the generated still in object storage (e.g. "/objects/uploads/<uuid>"). Fetch via GET /api/storage/objects/<id>.
        mimeType:
          type: string
          description: e.g. "image/png" or "image/jpeg"
        generatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp the image was generated and saved.
      required:
        - objectPath
        - mimeType
        - generatedAt
    QcFrameImageRequest:
      type: object
      description: Ask Gemini Vision to grade a generated frame still against the writer's prompt + cast references. The server fetches the candidate frame and any references from object storage just-in-time.
      properties:
        objectPath:
          type: string
          minLength: 1
          description: Object-storage path of the frame still to QC (e.g. "/objects/uploads/<uuid>").
        framePrompt:
          type: string
          minLength: 1
          maxLength: 4000
          description: The original writer prompt the image was meant to depict.
        style:
          type: string
          maxLength: 200
          description: Visual style of the project (e.g. "Live Action Cinematic"). Used as additional QC context.
        characterReferences:
          type: array
          maxItems: 8
          description: Optional cast reference sheets. When provided, QC also scores likeness adherence.
          items:
            $ref: "#/components/schemas/GenerateFrameImageReference"
        aspectRatio:
          $ref: "#/components/schemas/AspectRatio"
          description: When provided, QC also confirms the still appears to be in the requested aspect ratio.
      required:
        - objectPath
        - framePrompt
        - style
    QcFrameImageResult:
      type: object
      description: Structured QC verdict. `passed=true` means the frame is good enough to ship; otherwise the client may auto-regenerate using `suggestion` as a hint.
      properties:
        score:
          type: number
          minimum: 0
          maximum: 10
          description: 0-10 adherence score (10 = perfect match).
        passed:
          type: boolean
          description: Convenience flag — true when score >= the server's pass threshold (currently 7).
        issues:
          type: array
          items:
            type: string
          description: Short bullet list of problems the QC reviewer noticed. Empty when passed.
        suggestion:
          type: string
          description: One-sentence regen hint the client can append to the frame prompt on retry. Empty when passed.
      required:
        - score
        - passed
        - issues
        - suggestion
    RegenerateCharacterImageReference:
      type: object
      description: Optional user-uploaded reference image. Sent inline as base64 to Gemini so the new sheet preserves likeness from the photo.
      properties:
        b64Json:
          type: string
          description: Base64-encoded image bytes (no data URL prefix). Caller must keep total request body under ~8MB.
          minLength: 1
        mimeType:
          type: string
          description: e.g. "image/png", "image/jpeg", "image/webp"
          minLength: 1
          maxLength: 64
      required:
        - b64Json
        - mimeType
    RegenerateCharacterImageRequest:
      type: object
      description: Re-generate the reference sheet for a SINGLE character, optionally with custom user guidance and / or a reference photo.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
          maxLength: 1500
          description: Original character description from the story. Used to keep the new sheet anchored to the story's character.
        customPrompt:
          type: string
          maxLength: 1500
          description: Optional user guidance — wardrobe tweaks, age, mood, etc. Appended to the base sheet prompt.
        referenceImage:
          $ref: "#/components/schemas/RegenerateCharacterImageReference"
        style:
          type: string
          maxLength: 200
          description: Visual style of the project, used to keep the new sheet on-brand.
        aspectRatio:
          $ref: "#/components/schemas/AspectRatio"
          description: Aspect ratio for the regenerated reference sheet. Defaults to 16:9 to match the auto-generated sheets.
      required:
        - name
        - style
    CinemaStyleMode:
      type: string
      enum:
        - photoreal_cinematic
        - anime_2d
        - pixel_art
        - cgi_3d
        - commercial_product
      description: Top-level visual style mode. Drives the camera-language translation layer (e.g. real focal lengths for photoreal, anime composition language for 2D anime).
    CinemaOutputAspectRatio:
      type: string
      enum:
        - "16:9"
        - "9:16"
        - "1:1"
        - "4:5"
        - "3:4"
        - "21:9"
        - "2.39:1"
        - "4:3"
        - "3:2"
      description: Output aspect ratio shown to the user in the Output panel. Cinema Studio generates with Nano Banana 2 (gemini-3.1-flash-image-preview), which natively supports 1:1, 3:4, 4:3, 9:16, 16:9, 4:5, 3:2, and 21:9. Only the cinematic 2.39:1 anamorphic ratio is remapped to the nearest neighbour (21:9 ≈ 2.33:1) at generation time; the user-requested ratio is always preserved in the saved prompt for reproducibility.
    CinemaResolution:
      type: string
      enum: [standard, high, ultra]
    CinemaFormat:
      type: string
      enum: [png, jpg, webp]
      description: Requested output format. Today the server always returns PNG; jpg/webp are accepted and recorded in the response for forward-compatibility.
    CinemaShotRecipe:
      type: object
      description: Inline shot recipe (built-in or user-saved). Sent inline so custom recipes work without server-side persistence.
      properties:
        name:
          type: string
          maxLength: 80
        cameraAngle:
          type: string
          maxLength: 80
        shotSize:
          type: string
          maxLength: 80
        lens:
          type: string
          maxLength: 80
        lighting:
          type: string
          maxLength: 200
        composition:
          type: string
          maxLength: 200
        promptBoost:
          type: string
          maxLength: 400
    CinemaReferenceStrength:
      type: object
      description: 0-100 sliders that tell the model how strictly to lock to each reference dimension. Sent through into the prompt instruction template.
      properties:
        faceLock: { type: integer, minimum: 0, maximum: 100 }
        outfitLock: { type: integer, minimum: 0, maximum: 100 }
        poseLock: { type: integer, minimum: 0, maximum: 100 }
        styleLock: { type: integer, minimum: 0, maximum: 100 }
        locationLock: { type: integer, minimum: 0, maximum: 100 }
        lightingLock: { type: integer, minimum: 0, maximum: 100 }
        productShapeLock: { type: integer, minimum: 0, maximum: 100 }
        compositionLock: { type: integer, minimum: 0, maximum: 100 }
    CinemaGenerationControls:
      type: object
      description: 0-100 generation sliders + seed control.
      properties:
        seed:
          type: integer
          minimum: -1
          maximum: 2147483647
          description: -1 means "random / let model pick".
        randomSeed:
          type: boolean
        variationStrength: { type: integer, minimum: 0, maximum: 100 }
        creativeFreedom: { type: integer, minimum: 0, maximum: 100 }
        promptAdherence: { type: integer, minimum: 0, maximum: 100 }
        realismStrength: { type: integer, minimum: 0, maximum: 100 }
        styleStrength: { type: integer, minimum: 0, maximum: 100 }
        detailLevel: { type: integer, minimum: 0, maximum: 100 }
        compositionStrictness: { type: integer, minimum: 0, maximum: 100 }
    CinemaOutputControls:
      type: object
      properties:
        aspectRatio:
          $ref: "#/components/schemas/CinemaOutputAspectRatio"
        resolution:
          $ref: "#/components/schemas/CinemaResolution"
        imageCount:
          type: integer
          enum: [1, 2, 4]
        format:
          $ref: "#/components/schemas/CinemaFormat"
    CinemaReference:
      type: object
      description: Reference image already saved in object storage (e.g. via the Storage upload flow). The server fetches and inlines it before generation.
      properties:
        objectPath:
          type: string
          minLength: 1
        mimeType:
          type: string
          minLength: 1
          maxLength: 64
        label:
          type: string
          maxLength: 80
      required:
        - objectPath
        - mimeType
    CinemaImageRequest:
      type: object
      description: Full Cinema Image Studio request — combines the user's natural-language prompt with the structured camera/lens/recipe/slider/output state into a single image generation call.
      properties:
        rawPrompt:
          type: string
          minLength: 1
          maxLength: 4000
        styleMode:
          $ref: "#/components/schemas/CinemaStyleMode"
        cameraBodyId:
          type: string
          maxLength: 80
          nullable: true
        cameraBodyLabel:
          type: string
          maxLength: 120
          description: User-facing camera label (e.g. "ARRI Alexa 35 Inspired Look"). Used in the prompt envelope when the camera body lookup is not available.
        cameraInjection:
          type: string
          maxLength: 600
          description: Pre-built camera body prompt fragment.
        lensPackId:
          type: string
          maxLength: 80
          nullable: true
        lensPackLabel:
          type: string
          maxLength: 120
        lensInjection:
          type: string
          maxLength: 600
          description: Pre-built lens pack prompt fragment.
        focalLength:
          type: string
          maxLength: 80
        aperture:
          type: string
          maxLength: 40
        shotRecipe:
          $ref: "#/components/schemas/CinemaShotRecipe"
        referenceStrength:
          $ref: "#/components/schemas/CinemaReferenceStrength"
        generationControls:
          $ref: "#/components/schemas/CinemaGenerationControls"
        outputControls:
          $ref: "#/components/schemas/CinemaOutputControls"
        references:
          type: array
          maxItems: 8
          items:
            $ref: "#/components/schemas/CinemaReference"
        negativePrompt:
          type: array
          maxItems: 32
          items:
            type: string
            maxLength: 80
        styleTranslation:
          type: string
          maxLength: 1000
          description: Pre-computed style-translated camera language. The client can compute this with full UI context; if omitted, the server falls back to a sensible default for the style mode.
      required:
        - rawPrompt
        - styleMode
        - outputControls
    CinemaImageResponse:
      type: object
      properties:
        objectPath:
          type: string
        mimeType:
          type: string
        generatedAt:
          type: string
          format: date-time
        seed:
          type: integer
          description: The seed used for this generation. When the request used randomSeed=true, this is the random seed the server generated.
        finalPrompt:
          type: string
          description: The fully assembled prompt string sent to the image model. Useful for debug + "view prompt" features.
      required:
        - objectPath
        - mimeType
        - generatedAt
        - seed
        - finalPrompt
    CinemaPromptScoreRequest:
      type: object
      properties:
        rawPrompt:
          type: string
          minLength: 1
          maxLength: 4000
        configSummary:
          type: string
          maxLength: 4000
          description: Short human-readable summary of the camera / lens / recipe / sliders the user has selected, so the grader can score how well the prompt aligns with the configured shot.
      required:
        - rawPrompt
    CinemaPromptScoreResponse:
      type: object
      properties:
        overallPromptScore: { type: number, minimum: 0, maximum: 10 }
        cinematicScore: { type: number, minimum: 0, maximum: 10 }
        cameraClarityScore: { type: number, minimum: 0, maximum: 10 }
        lensClarityScore: { type: number, minimum: 0, maximum: 10 }
        lightingScore: { type: number, minimum: 0, maximum: 10 }
        styleConsistencyScore: { type: number, minimum: 0, maximum: 10 }
        characterConsistencyScore: { type: number, minimum: 0, maximum: 10 }
        compositionScore: { type: number, minimum: 0, maximum: 10 }
        promptRiskScore:
          type: number
          minimum: 0
          maximum: 10
          description: 0 = safe, 10 = high risk of being blocked / failing.
        missingDetails:
          type: array
          maxItems: 16
          items:
            type: string
        improvementSuggestions:
          type: array
          maxItems: 16
          items:
            type: string
        improvedPrompt:
          type: string
          maxLength: 4000
      required:
        - overallPromptScore
        - cinematicScore
        - cameraClarityScore
        - lensClarityScore
        - lightingScore
        - styleConsistencyScore
        - characterConsistencyScore
        - compositionScore
        - promptRiskScore
        - missingDetails
        - improvementSuggestions
        - improvedPrompt
    UploadMetadata:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. "image/jpeg").
    UploadUrlInfo:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload (expires in ~15 min).
        objectPath:
          type: string
          description: Normalized object path (e.g. "/objects/uploads/uuid"). Persist this; serve later via GET /api/storage/objects/<id>.
        metadata:
          $ref: "#/components/schemas/UploadMetadata"
    VideoStudioModel:
      type: string
      enum: [cont_pro, cont_ultra]
      description: Internal video engine selection. User-facing labels are "Cont Pro" and "Cont Ultra".
    VideoStudioAspectRatio:
      type: string
      enum: ["16:9", "9:16", "1:1"]
    VideoStudioVoiceoverLanguage:
      type: string
      enum: [hindi, english, hinglish]
    VideoStudioQuality:
      type: string
      enum: [standard, high]
    VideoStudioJobRequest:
      type: object
      required: [model, durationSeconds, aspectRatio, story]
      properties:
        model:
          $ref: "#/components/schemas/VideoStudioModel"
        durationSeconds:
          type: integer
          enum: [15, 30, 60, 120]
          description: Allowed values depend on model — Cont Pro 15/30/60, Cont Ultra 30/60/120.
        aspectRatio:
          $ref: "#/components/schemas/VideoStudioAspectRatio"
        voiceoverEnabled:
          type: boolean
          default: true
        voiceoverLanguage:
          oneOf:
            - $ref: "#/components/schemas/VideoStudioVoiceoverLanguage"
            - type: "null"
        bgmEnabled:
          type: boolean
          default: true
        subtitlesEnabled:
          type: boolean
          default: false
        quality:
          allOf:
            - $ref: "#/components/schemas/VideoStudioQuality"
          default: standard
        storyProjectId:
          oneOf:
            - type: string
            - type: "null"
          description: Optional ContentStudio project id this job was created from.
        story:
          $ref: "#/components/schemas/StoryResponse"
    VideoStudioChunkStatus:
      type: object
      required: [partNumber, timeRangeStart, timeRangeEnd, status, attempts]
      properties:
        partNumber:
          type: integer
        timeRangeStart:
          type: integer
        timeRangeEnd:
          type: integer
        status:
          type: string
          enum: [pending, generating, complete, failed]
        videoObjectPath:
          oneOf:
            - type: string
            - type: "null"
        lastFrameObjectPath:
          oneOf:
            - type: string
            - type: "null"
        summary:
          oneOf:
            - type: string
            - type: "null"
        attempts:
          type: integer
          default: 0
        error:
          oneOf:
            - type: string
            - type: "null"
    VideoStudioJobStatus:
      type: object
      required:
        - id
        - status
        - stage
        - message
        - progressPercent
        - currentPart
        - totalParts
        - model
        - durationSeconds
        - aspectRatio
        - createdAt
        - chunks
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, complete, failed, cancelled]
        stage:
          type: string
        message:
          type: string
        progressPercent:
          type: integer
          minimum: 0
          maximum: 100
        currentPart:
          type: integer
        totalParts:
          type: integer
        model:
          $ref: "#/components/schemas/VideoStudioModel"
        durationSeconds:
          type: integer
        aspectRatio:
          $ref: "#/components/schemas/VideoStudioAspectRatio"
        finalVideoObjectPath:
          oneOf:
            - type: string
            - type: "null"
        thumbnailObjectPath:
          oneOf:
            - type: string
            - type: "null"
        voiceoverScript:
          oneOf:
            - type: string
            - type: "null"
        error:
          oneOf:
            - type: string
            - type: "null"
        createdAt:
          type: string
          format: date-time
        completedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/VideoStudioChunkStatus"
