openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI generation operations (story, prompts, music, voiceover)
  - name: storage
    description: Object storage upload and serving endpoints
  - name: auth
    description: User authentication (signup, signin, signout, current user)
  - name: projects
    description: Per-user project CRUD (server-side persistence + cross-device sync)
  - name: video-studio
    description: AI Video Studio — story-driven continuous cinematic video generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate-story:
    post:
      operationId: generateStory
      tags: [ai]
      summary: Generate a structured story from a brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryRequest"
      responses:
        "200":
          description: Generated story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /continue-story:
    post:
      operationId: continueStory
      tags: [ai]
      summary: Continue an existing story with new acts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContinueStoryRequest"
      responses:
        "200":
          description: Continued story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /generate-video-prompts:
    post:
      operationId: generateVideoPrompts
      tags: [ai]
      summary: Generate video prompts for one part of the video, optimized for the selected target model (Seedance 2.0, Veo 3, Kling 2.1, Sora, Runway Gen-4, Luma Ray-2, Hailuo 02, Pika 2.0)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoPromptsRequest"
      responses:
        "200":
          description: Generated video part
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoPromptsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /edit-video-prompts:
    post:
      operationId: editVideoPrompts
      tags: [ai]
      summary: Refine an existing video part with a writer instruction while preserving continuity to surrounding parts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditVideoPromptsRequest"
      responses:
        "200":
          description: Refined video part
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoPromptsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /generate-music-brief:
    post:
      operationId: generateMusicBrief
      tags: [ai]
      summary: Generate a Suno/Udio music brief for the project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MusicBriefRequest"
      responses:
        "200":
          description: Generated music brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicBriefResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /generate-voiceover:
    post:
      operationId: generateVoiceover
      tags: [ai]
      summary: Generate a voiceover script in English, Hindi, or Hinglish for one video part
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceoverRequest"
      responses:
        "200":
          description: Generated voiceover
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceoverResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /expand-prompt:
    post:
      operationId: expandPrompt
      tags: [ai]
      summary: Expand a too-short Seedance copyablePrompt into the 4200-4500 char band by adding structural detail without altering meaning.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustPromptRequest"
      responses:
        "200":
          description: Expanded prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdjustPromptResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /trim-prompt:
    post:
      operationId: trimPrompt
      tags: [ai]
      summary: Trim a too-long Seedance copyablePrompt back into the 4200-4500 char band without dropping shots, sections, or audio bullets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustPromptRequest"
      responses:
        "200":
          description: Trimmed prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdjustPromptResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /generate-character-images:
    post:
      operationId: generateCharacterImages
      tags: [ai]
      summary: Generate a multi-angle character reference sheet for each story character using Google Gemini (Nano Banana). Each image contains front, left-profile, and right-profile views in a single composite suitable for downloading and pasting into Seedance as a character reference.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterImagesRequest"
      responses:
        "200":
          description: Generated character images (one per character; failures returned in errors[])
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterImagesResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /generate-frame-image:
    post:
      operationId: generateFrameImage
      tags: [ai]
      summary: Generate ONE Gemini image for a video part's starting or ending frame. Wraps the writer's frame prompt in a film-still instruction template, optionally injects character reference sheets so the cast stays on-model.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateFrameImageRequest"
      responses:
        "200":
          description: Generated frame still
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateFrameImageResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /qc-frame-image:
    post:
      operationId: qcFrameImage
      tags: [ai]
      summary: Quality-control review of a generated frame still. Loads the image from object storage and asks Gemini Vision to score how well it matches the writer's frame prompt and the cast reference sheets. Returns a structured score + issues so the client can decide whether to ship the frame or auto-regenerate it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QcFrameImageRequest"
      responses:
        "200":
          description: QC verdict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QcFrameImageResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL for direct file upload
      description: |
        Returns a presigned GCS URL for direct upload from the client.
        The body sent here is JSON metadata only (name, size, contentType) —
        NEVER the file bytes. After receiving the response, PUT the file
        directly to `uploadURL` and persist `objectPath` in your DB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadMetadata"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlInfo"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /cinema-image:
    post:
      operationId: generateCinemaImage
      tags: [ai]
      summary: Generate a single Cinema Image Studio still. Wraps the full structured camera/lens/recipe/sliders/output state in a hand-tuned cinematography prompt template, requests Gemini 2.5 Flash Image with the chosen aspect ratio, and saves the result to object storage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CinemaImageRequest"
      responses:
        "200":
          description: Generated cinema still
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CinemaImageResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /cinema-prompt-score:
    post:
      operationId: scoreCinemaPrompt
      tags: [ai]
      summary: Run AI Director prompt grading. Sends the user prompt and the structured cinema config to Claude (haiku) and returns a 0-10 score across 8 axes plus an improved prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CinemaPromptScoreRequest"
      responses:
        "200":
          description: Prompt score and improved rewrite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CinemaPromptScoreResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /regenerate-character-image:
    post:
      operationId: regenerateCharacterImage
      tags: [ai]
      summary: Re-generate the reference sheet for a SINGLE character with optional user-provided custom prompt and / or a reference photo. Returns the same shape as one entry in /generate-character-images.images[].
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateCharacterImageRequest"
      responses:
        "200":
          description: Newly generated single character reference sheet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterImageResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /video-studio/jobs:
    post:
      operationId: createVideoStudioJob
      tags: [video-studio]
      summary: Start an AI Video Studio job using a story from the Story Builder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoStudioJobRequest"
      responses:
        "202":
          description: Job accepted; client should poll GET /video-studio/jobs/{id} for progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoStudioJobStatus"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /video-studio/jobs/{id}:
    get:
      operationId: getVideoStudioJob
      tags: [video-studio]
      summary: Get current status snapshot for a video studio job (poll target)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current status snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoStudioJobStatus"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /video-studio/jobs/{id}/cancel:
    post:
      operationId: cancelVideoStudioJob
      tags: [video-studio]
      summary: Cancel a running video studio job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoStudioJobStatus"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    StoryAct:
      type: object
      properties:
        actNumber:
          type: integer
        title:
          type: string
        description:
          type: string
        keyMoment:
          type: string
      required:
        - actNumber
        - title
        - description
        - keyMoment
    StoryCharacter:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name
        - description
    StoryResponse:
      type: object
      properties:
        title:
          type: string
        synopsis:
          type: string
        acts:
          type: array
          items:
            $ref: "#/components/schemas/StoryAct"
        characters:
          type: array
          items:
            $ref: "#/components/schemas/StoryCharacter"
        mood:
          type: string
        colorPalette:
          type: array
          items:
            type: string
          description: List of hex color strings, e.g. ["#1a1a1a", "#E8FF47"]
        musicSuggestion:
          type: string
        commentary:
          type: string
          description: "A short 2-3 sentence chat-style note from the AI explaining the most important creative choices in this story (the hook, the visual signature, the emotional arc, or what just changed if this was a refinement). Optional — older clients will fall back to a generic message."
      required:
        - title
        - synopsis
        - acts
        - characters
        - mood
        - colorPalette
        - musicSuggestion
    StoryRequest:
      type: object
      properties:
        brief:
          type: string
          minLength: 1
          maxLength: 4000
        genre:
          type: string
          minLength: 1
          maxLength: 80
        duration:
          type: number
          minimum: 5
          maximum: 3600
          description: Total target duration in seconds (kept for backward compatibility, equivalent to totalDurationSeconds)
        totalDurationSeconds:
          type: number
          minimum: 5
          maximum: 3600
          description: Total target duration in seconds
        partsCount:
          type: integer
          minimum: 1
          maximum: 240
          description: Number of 15-second video parts (Math.ceil(totalDurationSeconds/15))
        style:
          type: string
          maxLength: 120
          description: Visual style name, e.g. "Live Action Cinematic"
        voiceoverLanguage:
          type: string
          enum: [none, english, hindi, hinglish]
          description: Language to write the voiceover in, or "none" to skip
      required:
        - brief
        - genre
        - duration
    ContinueStoryRequest:
      type: object
      properties:
        existingStory:
          $ref: "#/components/schemas/StoryResponse"
        direction:
          type: string
          minLength: 1
          maxLength: 2000
      required:
        - existingStory
        - direction

    VideoShot:
      type: object
      properties:
        shotNumber:
          type: integer
        timestamp:
          type: string
          description: e.g. "00:00-00:03"
        name:
          type: string
        effects:
          type: array
          items:
            type: string
        description:
          type: string
        cameraWork:
          type: string
        speed:
          type: string
        transition:
          type: string
        isSignature:
          type: boolean
        sceneDescription:
          type: string
          nullable: true
          description: Optional FRAMES-spec per-shot scene breakdown — a 2-4 sentence cinematic paragraph describing exactly what is on screen during this shot (subject + action + composition + lighting + atmosphere). Populated when frameSettings.sceneBreakdownEnabled is true.
      required:
        - shotNumber
        - timestamp
        - name
        - effects
        - description
        - cameraWork
        - speed
        - transition
        - isSignature
    VideoFramePrompt:
      type: object
      properties:
        prompt:
          type: string
          description: A single self-contained Seedance image prompt (4-8 sentences) describing exactly the framing, subject pose, lighting, lens, and atmosphere for this anchor frame. Pasted into Seedance image-gen to render the still.
      required:
        - prompt
    VideoEffectInventoryItem:
      type: object
      properties:
        name:
          type: string
        usedCount:
          type: integer
        shots:
          type: array
          items:
            type: integer
        role:
          type: string
      required:
        - name
        - usedCount
        - shots
        - role
    VideoDensityBlock:
      type: object
      properties:
        timeRange:
          type: string
        density:
          type: string
          description: "HIGH | MEDIUM | LOW"
        effects:
          type: array
          items:
            type: string
        count:
          type: integer
        duration:
          type: string
      required:
        - timeRange
        - density
        - effects
        - count
        - duration
    VideoEnergyArc:
      type: object
      properties:
        act1:
          type: string
        act2:
          type: string
        act3:
          type: string
      required:
        - act1
        - act2
        - act3
    VideoAudioSummary:
      type: object
      properties:
        voiceoverIncluded:
          type: boolean
        bgmIncluded:
          type: boolean
        keySyncPoints:
          type: array
          items:
            type: string
      required:
        - voiceoverIncluded
        - bgmIncluded
        - keySyncPoints
    VideoPromptsResponse:
      type: object
      properties:
        shots:
          type: array
          items:
            $ref: "#/components/schemas/VideoShot"
        effectsInventory:
          type: array
          items:
            $ref: "#/components/schemas/VideoEffectInventoryItem"
        densityMap:
          type: array
          items:
            $ref: "#/components/schemas/VideoDensityBlock"
        energyArc:
          $ref: "#/components/schemas/VideoEnergyArc"
        lastFrameDescription:
          type: string
        copyablePrompt:
          type: string
        autoVoiceoverScript:
          type: string
          nullable: true
          description: VO script written by the model when voiceoverLanguage was set in the request
        audioSummary:
          $ref: "#/components/schemas/VideoAudioSummary"
        startingFrame:
          allOf:
            - $ref: "#/components/schemas/VideoFramePrompt"
          nullable: true
          description: Optional FRAMES-spec starting-frame Seedance image prompt for this part. Populated when frameSettings.startingFrameEnabled is true.
        endingFrame:
          allOf:
            - $ref: "#/components/schemas/VideoFramePrompt"
          nullable: true
          description: Optional FRAMES-spec ending-frame Seedance image prompt for this part. Populated when frameSettings.endingFrameEnabled is true.
        promptMode:
          type: string
          enum: [normal, json]
          description: Which mode the model produced this prompt in. "normal" = human-readable structured text, "json" = JSON-stringified Seedance prompt envelope.
      required:
        - shots
        - effectsInventory
        - densityMap
        - energyArc
        - lastFrameDescription
        - copyablePrompt

    FrameSettings:
      type: object
      description: Per-project toggles controlling whether the model produces starting-frame, ending-frame, and per-shot scene-breakdown content. Defaults are all true.
      properties:
        startingFrameEnabled:
          type: boolean
        endingFrameEnabled:
          type: boolean
        sceneBreakdownEnabled:
          type: boolean
      required:
        - startingFrameEnabled
        - endingFrameEnabled
        - sceneBreakdownEnabled

    ReferenceImage:
      type: object
      description: A character / location / style reference image (auto-generated character sheet OR user upload). Sent inline as base64 to the model so it can build a visually-consistent prompt.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        kind:
          type: string
          enum: [character, location, style]
        source:
          type: string
          enum: [auto, upload]
          description: "auto = generated by /generate-character-images; upload = user-uploaded"
        b64Json:
          type: string
          description: Base64-encoded PNG/JPEG bytes (no data URL prefix)
        mimeType:
          type: string
          description: e.g. "image/png" or "image/jpeg"
      required:
        - name
        - kind
        - source
        - b64Json
        - mimeType

    PromptMode:
      type: string
      enum: [normal, json]
      description: Output format for the Seedance copyablePrompt. "normal" = human-readable structured text. "json" = JSON-stringified Seedance prompt envelope (recommended — Seedance 2.0 parses it more reliably).

    AspectRatio:
      type: string
      enum: ["16:9", "9:16", "1:1", "4:3", "3:4", "21:9"]
      description: Target aspect ratio for the rendered video and any reference frame stills. The video-prompt writer is told the ratio so framing instructions match it, and Gemini image generation is requested at the same ratio so the still you see in the prompts page is what the final video will look like. Defaults to "16:9" when omitted.

    VideoModel:
      type: string
      enum:
        - seedance-2.0
        - veo-3
        - kling-2.1
        - sora
        - runway-gen-4
        - luma-ray-2
        - hailuo-02
        - pika-2.0
      description: |
        Target AI video generation model. The writer adapts prompt dialect, recommended length, and physics-realism guidance to the selected model. Defaults to "seedance-2.0" when omitted.
        Per-model max single-clip duration (used to derive the duration pills the UI offers): seedance-2.0 2-15s, veo-3 2-8s, kling-2.1 5-10s, sora 5-20s, runway-gen-4 5-10s, luma-ray-2 5-9s, hailuo-02 6-10s, pika-2.0 5-10s.

    VideoPromptsRequest:
      type: object
      properties:
        story:
          $ref: "#/components/schemas/StoryResponse"
        style:
          type: string
          minLength: 1
          maxLength: 120
        videoModel:
          $ref: "#/components/schemas/VideoModel"
          description: When set, the writer adapts copyablePrompt dialect (Seedance bracket+sections, Veo natural prose, Kling motion-precise verbs, etc.) to the selected target. Defaults to "seedance-2.0" when omitted.
        framesAsImageReferences:
          type: boolean
          description: |
            When true, the writer assumes the user will paste the part's starting frame (Image 1) and ending frame (Image 2) into the target model alongside the copyablePrompt. The writer then embeds an explicit "FIRST FRAME = Image 1, LAST FRAME = Image 2" instruction in copyablePrompt (and as `imageToImage` inside the JSON envelope) so the model treats them as keyframe anchors. Defaults to false.
        duration:
          type: number
          minimum: 1
          maximum: 3600
          description: Duration of this single part in seconds (a "part" is one chunk of a longer multi-part video, so it can be longer than what a single clip from the selected target model can produce — the writer will still write per-part shots that sum to this duration)
        part:
          type: integer
          minimum: 1
          maximum: 240
        totalParts:
          type: integer
          minimum: 1
          maximum: 240
        previousLastFrame:
          type: string
          maxLength: 4000
          description: lastFrameDescription from the previous part for continuation
        previousParts:
          type: array
          items:
            type: string
          description: |
            One compact text digest per already-generated part (parts 1..N-1), in order.
            Each entry should summarize that part's shots, voiceover script, effects,
            and last frame so the model has full memory of what was already shown
            and can avoid repetition / maintain cumulative continuity.
        voiceoverLanguage:
          type: string
          nullable: true
          enum: [english, hindi, hinglish, null]
          description: When set, Claude auto-writes a part-specific VO
        voiceoverTone:
          type: string
          nullable: true
          maxLength: 80
        voiceoverScript:
          type: string
          nullable: true
          maxLength: 4000
          description: Optional pre-written script for this part. If absent and voiceoverLanguage is set, the model writes one.
        bgmStyle:
          type: string
          nullable: true
          maxLength: 120
        bgmTempo:
          type: string
          nullable: true
          maxLength: 40
        bgmInstruments:
          type: array
          maxItems: 20
          items:
            type: string
            maxLength: 60
        mode:
          $ref: "#/components/schemas/PromptMode"
          description: When omitted defaults to "json".
        frameSettings:
          $ref: "#/components/schemas/FrameSettings"
          description: When omitted, all three flags default to true.
        referenceImages:
          type: array
          maxItems: 5
          description: Up to 5 inline reference images (auto-generated char sheets + user uploads). Each image is sent as a content block alongside the user prompt so Claude can build visually-consistent prompts.
          items:
            $ref: "#/components/schemas/ReferenceImage"
        aspectRatio:
          $ref: "#/components/schemas/AspectRatio"
          description: When set, the writer is instructed to phrase framing/composition for this aspect ratio (default 16:9 if omitted).
      required:
        - story
        - style
        - duration
        - part
        - totalParts

    EditVideoPromptsRequest:
      type: object
      properties:
        story:
          $ref: "#/components/schemas/StoryResponse"
        style:
          type: string
          minLength: 1
          maxLength: 120
        videoModel:
          $ref: "#/components/schemas/VideoModel"
          description: When set, the refined copyablePrompt is rewritten in the dialect of the selected target model. Defaults to "seedance-2.0" when omitted.
        framesAsImageReferences:
          type: boolean
          description: When true, the refined copyablePrompt embeds the explicit "FIRST FRAME = Image 1, LAST FRAME = Image 2" instruction so the user can paste the rendered starting/ending stills as keyframe anchors into the target model.
        duration:
          type: number
          minimum: 1
          maximum: 3600
          description: Duration of this single part in seconds (matches the per-part duration the original part was generated with)
        part:
          type: integer
          minimum: 1
          maximum: 240
        totalParts:
          type: integer
          minimum: 1
          maximum: 240
        instruction:
          type: string
          description: The writer's edit instruction (e.g. "make shot 3 slower", "swap the signature effect to a whip pan", "drop the third shot entirely")
        existingPart:
          $ref: "#/components/schemas/VideoPromptsResponse"
        previousLastFrame:
          type: string
          nullable: true
          description: lastFrameDescription from the previous part — the FIRST shot of the refined part must continue from this frame.
        previousParts:
          type: array
          items:
            type: string
          description: |
            Compact text digests of all OTHER already-generated parts (parts 1..N-1, excluding the part being edited),
            in order, so the model has cumulative memory of what was already shown across the project and avoids
            inadvertently breaking continuity beyond just the immediate neighbours.
        nextFirstShot:
          type: string
          nullable: true
          description: One-line description of the FIRST shot of the next part — the refined part's lastFrameDescription must end in a state that allows that next shot to enter seamlessly. Omit when refining the final part.
        voiceoverLanguage:
          type: string
          nullable: true
        voiceoverTone:
          type: string
          nullable: true
        voiceoverScript:
          type: string
          nullable: true
        bgmStyle:
          type: string
          nullable: true
        bgmTempo:
          type: string
          nullable: true
        bgmInstruments:
          type: array
          items:
            type: string
        mode:
          $ref: "#/components/schemas/PromptMode"
          description: When omitted defaults to "json".
        frameSettings:
          $ref: "#/components/schemas/FrameSettings"
        referenceImages:
          type: array
          maxItems: 5
          items:
            $ref: "#/components/schemas/ReferenceImage"
        aspectRatio:
          $ref: "#/components/schemas/AspectRatio"
          description: When set, the writer is instructed to phrase framing/composition for this aspect ratio (default 16:9 if omitted).
      required:
