kind = "web"
previewPath = "/"
title = "ContentStudio AI"
version = "1.0.0"
id = "artifacts/contentstudio-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20654

[services.development]
run = "pnpm --filter @workspace/contentstudio-ai run dev"

[services.production]
serve = "static"
publicDir = "artifacts/contentstudio-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/contentstudio-ai", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
PORT = "20654"
BASE_PATH = "/"
CI = "true"

[services.env]
PORT = "20654"
BASE_PATH = "/"
